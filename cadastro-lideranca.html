<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-AU-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Descrição do meu Documento">
    <title>Cadastro Liderança</title>
    <link rel="icon" type="image/png" href="src/img/Dejeadalpe.png">
    <link rel="apple-touch-icon" href="src/img/Dejeadalpe.png">
    <meta name="apple-mobile-web-app-title" content="DEJEADALPE">
    <meta name="application-name" content="DEJEADALPE">
    <link rel="manifest" href="/cadast/manifest.json">
    <link rel="stylesheet" href="src/css/reset.css">
    <link rel="stylesheet" href="src/css/variaveis.css">
    <link rel="stylesheet" href="src/css/cadastro-lideranca.css">
    <link rel="stylesheet" href="src/css/responsivo.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <main>
        <div class="container">

            <h1>Cadastro Liderança</h1>

            <form id="form-lideranca">
                <label for="cargo">Cargo</label>
                <select name="cargo" id="cargo">
                    <option value="">Selecione seu cargo</option>
                    <option value="superintendente">Superintendente</option>
                    <option value="vice-superintendente">Vice-Superintendente</option>
                    <option value="secretaro">Secretário</option>
                    <option value="adjunto">Adjunto</option>
                    <option value="dirigente">Dirigente</option>
                    <option value="vice-dirigente">Vice-Dirigente</option>
                    <option value="secretario-de-area">Secretário de Área</option>
                    <option value="maestro-de-area">Maestro de Área</option>
                    <option value="coordenador-de-area">Coordenador de Área</option>
                </select>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Digite seu email">

                <label for="senha">Senha</label>
                <div class="campo-senha">
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha"
                        autocomplete="new-password">
                    <button type="button" class="ver-senha">👀</button>
                </div>

                <label for="confirmar-senha">Confirmar Senha</label>
                <div class="campo-senha">
                    <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Confirme sua senha"
                        autocomplete="new-password">
                    <button type="button" class="ver-senha">👁</button>
                </div>

                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </main>

    <script src="src/js/cadastro-lideranca.js"></script>

</body>

</html>
